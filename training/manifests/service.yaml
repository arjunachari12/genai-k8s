apiVersion: v1
kind: Service
metadata:
  name: genai-api
  namespace: genai-platform
  labels:
    app: genai-platform
    component: api
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: genai-platform
    component: api
---
apiVersion: v1
kind: Service
metadata:
  name: genai-api-stable
  namespace: genai-platform
  labels:
    app: genai-platform
    component: api
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: genai-platform
    component: api
    rollouts-pod-template-hash: stable
---
apiVersion: v1
kind: Service
metadata:
  name: genai-api-canary
  namespace: genai-platform
  labels:
    app: genai-platform
    component: api
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: genai-platform
    component: api
    rollouts-pod-template-hash: canary