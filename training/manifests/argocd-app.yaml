apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: genai-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_USERNAME/genai-k8s.git  # Replace with your GitHub repo URL
    path: genai-platform/helm/genai-platform
    targetRevision: HEAD
    helm:
      valueFiles:
      - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: genai-platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - PruneLast=true