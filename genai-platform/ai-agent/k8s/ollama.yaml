apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-data
  namespace: genai
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 8Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: genai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
      - name: ollama
        image: ollama/ollama:latest
        imagePullPolicy: IfNotPresent
        command: ["/bin/sh", "-c"]
        args:
        - |
          ollama serve &
          server_pid=$!
          until ollama list >/dev/null 2>&1; do
            sleep 2
          done
          ollama pull tinyllama
          wait "$server_pid"
        ports:
        - containerPort: 11434
        readinessProbe:
          httpGet:
            path: /api/tags
            port: 11434
          initialDelaySeconds: 10
          periodSeconds: 5
        volumeMounts:
        - name: ollama-data
          mountPath: /root/.ollama
      volumes:
      - name: ollama-data
        persistentVolumeClaim:
          claimName: ollama-data
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: genai
spec:
  selector:
    app: ollama
  ports:
  - port: 11434
    targetPort: 11434
